# Posts development build download links on PRs after PR Checks finishes.
# Runs in the base-repo context (workflow_run) so GITHUB_TOKEN can comment on
# fork PRs, where pull_request jobs are limited to a read-only token.
name: Comment Build Links

on:
  workflow_run:
    workflows: ["PR Checks"]
    types:
      - completed

permissions:
  contents: read

jobs:
  comment-build-links:
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      actions: read
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runId = run.id;

            // workflow_run.pull_requests is often empty for fork PRs; resolve via head SHA.
            let pr = run.pull_requests?.[0]?.number;
            if (!pr) {
              const { data: pulls } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner,
                repo,
                commit_sha: run.head_sha,
              });
              const openPr = pulls.find(p => p.state === 'open') || pulls[0];
              pr = openPr?.number;
            }
            if (!pr) {
              const headOwner = run.head_repository?.owner?.login;
              const headBranch = run.head_branch;
              if (headOwner && headBranch) {
                const { data: pulls } = await github.rest.pulls.list({
                  owner,
                  repo,
                  state: 'open',
                  head: `${headOwner}:${headBranch}`,
                });
                pr = pulls[0]?.number;
              }
            }
            if (!pr) {
              core.info(`No PR found for workflow run ${runId} (sha ${run.head_sha}); skipping.`);
              return;
            }

            const { data: { artifacts } } = await github.rest.actions.listWorkflowRunArtifacts({
              owner,
              repo,
              run_id: runId,
              per_page: 100,
            });

            const buildArtifacts = artifacts.filter(a => a.name.endsWith(`-pr-${pr}`));
            if (buildArtifacts.length === 0) {
              core.info(`No build artifacts for PR #${pr}; skipping comment.`);
              return;
            }

            const platformLabel = {
              'macos-latest': 'macOS (Apple Silicon)',
              'macos-15-intel': 'macOS (Intel)',
              'ubuntu-latest': 'Linux (x64)',
              'ubuntu-24.04-arm': 'Linux (ARM)',
              'windows-latest': 'Windows',
            };

            const lines = buildArtifacts.map(a => {
              const url = `https://github.com/${owner}/${repo}/actions/runs/${runId}/artifacts/${a.id}`;
              const key = a.name.replace(`-artifacts-pr-${pr}`, '');
              const label = platformLabel[key] || key;
              return `| ${label} | [Download](${url}) |`;
            });

            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}`;
            const marker = '<!-- dev-build-comment -->';
            const body = [
              marker,
              '## Development Builds',
              '',
              'Test builds are ready for this PR:',
              '',
              '| Platform | Download |',
              '|----------|----------|',
              ...lines,
              '',
              `> Artifacts expire after 7 days. [View workflow run](${runUrl})`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: pr,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr,
                body,
              });
            }
